name: Deploy to Cloudflare Workers

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc -b

      - name: Unit tests
        run: npm run test:unit

      - name: Inject KV, D1 IDs and Variables
        run: node scripts/inject-wrangler-config.cjs
        env:
          KV_AUTH_TOKENS_ID: ${{ secrets.KV_AUTH_TOKENS_ID }}
          KV_VERIFICATION_CODES_ID: ${{ secrets.KV_VERIFICATION_CODES_ID }}
          KV_SSRF_CACHE_ID: ${{ secrets.KV_SSRF_CACHE_ID }}
          D1_DATABASE_ID: ${{ secrets.D1_DATABASE_ID }}
          ROUTE_PATTERN: ${{ secrets.ROUTE_PATTERN}}
          ROUTE_ZONE_NAME: ${{ secrets.ROUTE_ZONE_NAME }}
          TURNSTILE_SITE_KEY: ${{ vars.TURNSTILE_SITE_KEY }}
          SMTP_HOST: ${{ vars.SMTP_HOST }}
          SMTP_PORT: ${{ vars.SMTP_PORT }}
          ENVIRONMENT: production

      - name: Apply D1 Migrations
        id: d1-migrations
        run: |
          set -e
          echo "Applying D1 migrations..."
          npx wrangler d1 migrations apply cloud-health-db --remote
          echo "D1 migrations applied successfully"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Sync secrets via Wrangler
        run: |
          npx wrangler secret put TURNSTILE_SECRET_KEY <<< "${{ secrets.TURNSTILE_SECRET_KEY }}"
          npx wrangler secret put UPSTASH_REST_URL <<< "${{ secrets.UPSTASH_REST_URL }}"
          npx wrangler secret put UPSTASH_REST_TOKEN <<< "${{ secrets.UPSTASH_REST_TOKEN }}"
          npx wrangler secret put SMTP_USER <<< "${{ secrets.SMTP_USER }}"
          npx wrangler secret put SMTP_PASS <<< "${{ secrets.SMTP_PASS }}"
          npx wrangler secret put ADMIN_USERNAME <<< "${{ secrets.ADMIN_USERNAME }}"
          npx wrangler secret put ADMIN_PASSWORD <<< "${{ secrets.ADMIN_PASSWORD }}"
          npx wrangler secret put ALLOWED_ORIGINS <<< "${{ secrets.ALLOWED_ORIGINS }}"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy to Cloudflare
        id: deploy
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Health check
        id: health_check
        run: |
          DEPLOY_URL="${{ secrets.DEPLOY_URL }}"
          DEPLOY_URL="${DEPLOY_URL%/}"
          echo "Checking health at $DEPLOY_URL/api/health ..."
          for i in 1 2 3 4 5; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$DEPLOY_URL/api/health" || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed (HTTP $STATUS)"
              echo "healthy=true" >> $GITHUB_OUTPUT
              exit 0
            fi
            echo "Attempt $i: HTTP $STATUS, retrying in 10s..."
            sleep 10
          done
          echo "Health check failed after 5 attempts"
          echo "healthy=false" >> $GITHUB_OUTPUT
          exit 1

      - name: Smoke test
        id: smoke_test
        run: |
          DEPLOY_URL="${{ secrets.DEPLOY_URL }}"
          DEPLOY_URL="${DEPLOY_URL%/}"
          FAILED=0

          echo "=== Smoke Tests ==="

          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$DEPLOY_URL/" || echo "000")
          if [ "$STATUS" != "200" ]; then echo "FAIL: / returned $STATUS"; FAILED=1; else echo "PASS: / ($STATUS)"; fi

          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$DEPLOY_URL/api/health" || echo "000")
          if [ "$STATUS" != "200" ]; then echo "FAIL: /api/health returned $STATUS"; FAILED=1; else echo "PASS: /api/health ($STATUS)"; fi

          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$DEPLOY_URL/api/config/public" || echo "000")
          if [ "$STATUS" != "200" ]; then echo "FAIL: /api/config/public returned $STATUS"; FAILED=1; else echo "PASS: /api/config/public ($STATUS)"; fi

          STATUS=$(curl -s -o /dev/null -w "%{http_code}" -X POST "$DEPLOY_URL/api/auth/login" -H "Content-Type: application/json" -d '{}' || echo "000")
          if [ "$STATUS" != "400" ]; then echo "FAIL: /api/auth/login (empty) returned $STATUS (expected 400)"; FAILED=1; else echo "PASS: /api/auth/login rejects empty ($STATUS)"; fi

          if [ "$FAILED" = "1" ]; then
            echo "Smoke tests FAILED"
            exit 1
          fi
          echo "All smoke tests passed"

      - name: Rollback on failure
        if: failure() && (steps.health_check.outcome == 'failure' || steps.smoke_test.outcome == 'failure')
        run: |
          echo "Deployment health check failed, rolling back to previous version..."
          npx wrangler rollback
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Restore wrangler.toml
        if: always()
        run: git checkout wrangler.toml

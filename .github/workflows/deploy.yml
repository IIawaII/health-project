name: Deploy to Cloudflare Workers

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint check
        run: npm run lint

      - name: Type check
        run: npx tsc -b

      - name: Inject KV, D1 IDs and Variables
        run: node scripts/inject-wrangler-config.cjs
        env:
          KV_AUTH_TOKENS_ID: ${{ secrets.KV_AUTH_TOKENS_ID }}
          KV_VERIFICATION_CODES_ID: ${{ secrets.KV_VERIFICATION_CODES_ID }}
          D1_DATABASE_ID: ${{ secrets.D1_DATABASE_ID }}
          TURNSTILE_SITE_KEY: ${{ vars.TURNSTILE_SITE_KEY }}

      - name: Apply D1 Migrations
        run: npx wrangler d1 migrations apply cloud-health-db --remote

        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy to Cloudflare
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Sync secrets via Wrangler
        run: |
          echo "${{ secrets.TURNSTILE_SECRET_KEY }}" | npx wrangler secret put TURNSTILE_SECRET_KEY --name health-project
          echo "${{ secrets.RESEND_API_KEY }}" | npx wrangler secret put RESEND_API_KEY --name health-project
          echo "${{ secrets.ADMIN_USERNAME }}" | npx wrangler secret put ADMIN_USERNAME --name health-project
          echo "${{ secrets.ADMIN_PASSWORD }}" | npx wrangler secret put ADMIN_PASSWORD --name health-project
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

name = "health-project"
main = "worker.ts"
compatibility_date = "2025-01-01"

[assets]
directory = "./dist"

[build]
command = "npm run build"
watch_dir = ["src", "functions", "worker.ts"]

[[d1_databases]]
binding = "DB"
database_name = "health-project-db"
database_id = "D1_DATABASE_ID"

[[kv_namespaces]]
binding = "AUTH_TOKENS"
id = "KV_AUTH_TOKENS_ID"

[[kv_namespaces]]
binding = "VERIFICATION_CODES"
id = "KV_VERIFICATION_CODES_ID"

# D1 Database:
#   - DB (users table, verification_codes table, verification_code_cooldowns table)
#
# KV Namespaces:
#   - AUTH_TOKENS (登录令牌、刷新令牌)
#   - VERIFICATION_CODES (IP 级别验证码发送限流)
#
# Variables:
#   - TURNSTILE_SITE_KEY
#
# Secrets:
#   - TURNSTILE_SECRET_KEY
#   - RESEND_API_KEY

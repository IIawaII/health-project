name = "health-project"
main = "worker.ts"
compatibility_date = "2025-01-01"

[assets]
directory = "./dist"

[build]
command = "npm run build"
watch_dir = ["src", "functions", "worker.ts"]

[[kv_namespaces]]
binding = "USERS"
id = "KV_USERS_ID"

[[kv_namespaces]]
binding = "AUTH_TOKENS"
id = "KV_AUTH_TOKENS_ID"

[[kv_namespaces]]
binding = "VERIFICATION_CODES"
id = "KV_VERIFICATION_CODES_ID"

# KV Namespaces:
#   - USERS
#   - AUTH_TOKENS
#   - VERIFICATION_CODES
#
# Variables:
#   - TURNSTILE_SITE_KEY
#
# Secrets:
#   - TURNSTILE_SECRET_KEY
#   - RESEND_API_KEY
